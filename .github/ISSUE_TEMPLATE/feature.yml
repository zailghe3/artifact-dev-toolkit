name: Feature request
description: Propose a new capability or improvement for the application
title: "[Feature ID]: "
labels:
  - "type:feature"
body:
  - type: markdown
    attributes:
      value: |
        Use this template for implementation-ready features. Discuss the idea first if the scope or user experience is still unclear.

        Assign a Feature ID before implementation using the repository convention, such as `DEV-001`. The Feature ID identifies the product capability independently from the GitHub issue number; the GitHub issue number remains the canonical work-item tracker.

  - type: markdown
    attributes:
      value: |
        ## Codex execution contract

        This issue is intended to be a self-sufficient instruction for Codex. When Codex is launched with the full GitHub issue URL, Codex must:

        - treat the current GitHub issue as the complete implementation contract and single source of truth;
        - read the complete issue before changing code;
        - verify that the issue belongs to `zailghe3/artifact-dev-toolkit`;
        - verify that the issue title, Feature ID, objective, required behaviour, and expected scope are mutually consistent;
        - briefly restate the understood objective and likely areas of change before implementation;
        - stop without modifying code if the issue cannot be retrieved, belongs to another repository, is incomplete, or conflicts with the task context;
        - never substitute another issue, prior task, inferred feature, or remembered requirement;
        - remain strictly within the stated scope and out-of-scope boundaries;
        - not implement unrelated improvements;
        - read `specs/000-current-application-spec.md` before implementation;
        - update `specs/000-current-application-spec.md` in the same pull request whenever implemented behaviour changes;
        - run relevant tests, type checking, and production build validation;
        - open a pull request whose title or summary includes the Feature ID;
        - include a closing reference such as `Closes #<issue-number>`;
        - describe any intentional deviation or unresolved item in the pull request.

  - type: input
    id: feature-id
    attributes:
      label: Feature ID
      description: Stable capability identifier using the repository convention, for example DEV-001.
      placeholder: DEV-001
    validations:
      required: true

  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: What outcome should this change achieve?
      placeholder: Describe the user or product outcome, not only the technical change.
    validations:
      required: true

  - type: textarea
    id: user-context
    attributes:
      label: User context
      description: Why is this useful, and how will it be used?
    validations:
      required: true

  - type: textarea
    id: current-behaviour
    attributes:
      label: Current behaviour
      description: What does the application do today?
    validations:
      required: true

  - type: textarea
    id: required-behaviour
    attributes:
      label: Required behaviour
      description: Describe the expected behaviour after implementation.
    validations:
      required: true

  - type: textarea
    id: user-experience
    attributes:
      label: User experience
      description: Describe screens, actions, messages, and interaction flow.

  - type: textarea
    id: functional-requirements
    attributes:
      label: Functional requirements
      description: List the detailed requirements Codex must implement.
      placeholder: |
        1. Requirement one
        2. Requirement two
        3. Requirement three
    validations:
      required: true

  - type: textarea
    id: technical-considerations
    attributes:
      label: Technical considerations
      description: Note relevant architecture, storage, security, deployment, migration, or compatibility constraints.

  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of scope
      description: State what must deliberately not be included in this issue.

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: Provide observable, testable completion criteria.
      placeholder: |
        - [ ] Expected behaviour is implemented
        - [ ] Relevant error and edge cases are handled
        - [ ] Typecheck and build succeed
        - [ ] Current application specification is updated to reflect the implemented behaviour
    validations:
      required: true

  - type: checkboxes
    id: implementation-completion
    attributes:
      label: Definition of done
      description: These requirements apply to the implementation pull request.
      options:
        - label: The issue acceptance criteria are satisfied.
          required: true
        - label: Relevant checks, tests, typechecking, and build validation pass.
          required: true
        - label: Security and deployment implications have been considered.
          required: true
        - label: The current application specification has been reviewed and updated in the same pull request where required.
          required: true
        - label: The pull request includes the Feature ID and a closing reference to this issue.
          required: true

  - type: textarea
    id: codex-guidance
    attributes:
      label: Codex implementation guidance
      description: Optional instructions for Codex, including files to review or constraints to preserve.
