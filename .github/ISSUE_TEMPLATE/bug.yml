name: Bug report
description: Report incorrect or unexpected application behaviour
title: "[Bug]: "
labels:
  - "type:bug"
body:
  - type: markdown
    attributes:
      value: |
        Provide enough information for the problem to be reproduced and verified. Do not include passwords, API tokens, client information, or other sensitive data.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Briefly describe the problem and its impact.
    validations:
      required: true

  - type: textarea
    id: current-behaviour
    attributes:
      label: Current behaviour
      description: What happens now?
    validations:
      required: true

  - type: textarea
    id: expected-behaviour
    attributes:
      label: Expected behaviour
      description: What should happen instead?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Give the smallest reliable sequence that demonstrates the issue.
      placeholder: |
        1. Open ...
        2. Select ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include the relevant URL or environment, browser, device, branch, and commit where known.

  - type: textarea
    id: evidence
    attributes:
      label: Logs or screenshots
      description: Add sanitised logs, error messages, or screenshots. Do not include secrets or confidential content.

  - type: textarea
    id: scope
    attributes:
      label: Fix scope and constraints
      description: Note any known architectural, security, deployment, or compatibility constraints.

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: Explain how the fix will be verified.
      placeholder: |
        - [ ] The reported behaviour can no longer be reproduced
        - [ ] Relevant regression coverage is added where appropriate
        - [ ] Typecheck and build succeed
        - [ ] Current application specification is updated if the fix changes documented behaviour
    validations:
      required: true

  - type: checkboxes
    id: implementation-completion
    attributes:
      label: Definition of done
      description: These requirements apply to the implementation pull request.
      options:
        - label: The root cause is addressed rather than only masking the symptom.
          required: true
        - label: Relevant checks, tests, typechecking, and build validation pass.
          required: true
        - label: The current application specification is reviewed after development and updated in the same pull request when the implemented or expected behaviour has changed.
          required: true
        - label: The pull request links to and closes this issue.
          required: true

  - type: textarea
    id: codex-guidance
    attributes:
      label: Codex implementation guidance
      description: Optional instructions for Codex, including suspected files or approaches to avoid.
