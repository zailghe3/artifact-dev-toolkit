name: Setup canonical Node.js and npm
description: Set up Node.js 22, npm 10.9.7, npm cache, and report runtime versions.
runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # actions/setup-node@v4
      with:
        node-version: 22
        cache: npm
        cache-dependency-path: package-lock.json
    - name: Install canonical npm
      shell: bash
      run: npm install -g npm@10.9.7
    - name: Report runtime versions
      shell: bash
      run: |
        echo "Node.js $(node --version)" | tee -a "$GITHUB_STEP_SUMMARY"
        echo "npm $(npm --version)" | tee -a "$GITHUB_STEP_SUMMARY"
