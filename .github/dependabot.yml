version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      pinned-github-actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    commit-message:
      prefix: ci
    labels:
      - dependencies
      - github-actions

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 8
    versioning-strategy: increase-if-necessary
    groups:
      next-react-opennext-minor-patch:
        patterns:
          - next
          - react
          - react-dom
          - eslint-config-next
          - "@opennextjs/cloudflare"
        update-types:
          - minor
          - patch
      eslint-typescript-types-minor-patch:
        patterns:
          - eslint
          - "eslint-*"
          - typescript
          - typescript-eslint
          - "@typescript-eslint/*"
          - "@types/*"
        update-types:
          - minor
          - patch
      tailwind-postcss-minor-patch:
        patterns:
          - tailwindcss
          - "@tailwindcss/*"
          - postcss
        update-types:
          - minor
          - patch
      cloudflare-tooling-minor-patch:
        patterns:
          - wrangler
        update-types:
          - minor
          - patch
      runtime-support-minor-patch:
        patterns:
          - zod
          - gray-matter
          - remark
          - remark-html
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    commit-message:
      prefix: deps
    labels:
      - dependencies
      - npm
