name: Apply auto-merge label

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - ready_for_review

permissions:
  issues: write
  pull-requests: write

jobs:
  label:
    name: Label non-draft pull requests
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Apply auto-merge label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr edit "$PR_URL" --add-label auto-merge
