name: Manual feature issue recovery

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Explicit main ref or SHA to process
        required: true
        default: main
        type: string
      mode:
        description: Request selection mode
        required: true
        default: all
        type: choice
        options: [all, changed]
      files:
        description: Optional newline-separated canonical request files for changed mode
        required: false
        type: string

permissions:
  contents: read
  issues: write

jobs:
  create-feature-issues:
    uses: ./.github/workflows/reusable-create-feature-issues.yml
    with:
      ref: ${{ inputs.ref }}
      mode: ${{ inputs.mode }}
      files: ${{ inputs.files }}
