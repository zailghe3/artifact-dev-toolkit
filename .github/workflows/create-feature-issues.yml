name: Create feature issues from requests

on:
  push:
    branches:
      - main
    paths:
      - 'requests/features/pending/*.json'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Request selection mode'
        required: true
        default: 'all-pending'
        type: choice
        options:
          - all-pending
          - added

permissions:
  contents: write
  issues: write

concurrency:
  group: feature-request-issues-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-feature-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Validate feature issue tooling
        run: npm run issue:validate

      - name: Create GitHub issues
        id: create_issues
        env:
          GH_TOKEN: ${{ github.token }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
          FEATURE_REQUEST_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'added' }}
        run: node scripts/create-feature-issues-from-requests.mjs

      - name: Commit processed request records
        if: always()
        run: |
          if git diff --quiet -- requests/features; then
            echo "No request status changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add requests/features
          git commit -m "Record processed feature requests"
          git push
