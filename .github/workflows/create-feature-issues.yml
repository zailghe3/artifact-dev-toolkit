name: Create feature issues from requests

on:
  push:
    branches:
      - main
    paths:
      - 'requests/features/pending/*.json'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Request selection mode'
        required: true
        default: 'all-pending'
        type: choice
        options:
          - all-pending
          - added

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: feature-request-issues-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-feature-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Validate feature issue tooling
        run: npm run issue:validate

      - name: Create GitHub issues
        id: create_issues
        env:
          GH_TOKEN: ${{ github.token }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
          FEATURE_REQUEST_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'added' }}
        run: node scripts/create-feature-issues-from-requests.mjs

      - name: Open processed request pull requests
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/open-feature-request-processing-prs.mjs
