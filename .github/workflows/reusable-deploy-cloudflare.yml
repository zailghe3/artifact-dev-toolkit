name: Reusable / deploy Cloudflare

on:
  workflow_call:
    inputs:
      ref:
        required: true
        type: string
      commit_sha:
        required: true
        type: string
      pull_request_number:
        required: false
        type: string
        default: ""
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true

permissions:
  contents: read

concurrency:
  group: production-cloudflare-deploy-${{ github.repository }}
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy-cloudflare
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install canonical npm
        run: npm install -g "$(node -p 'require("./package.json").packageManager')"
      - name: Report runtime versions
        run: |
          echo "Node.js $(node --version)" | tee -a "$GITHUB_STEP_SUMMARY"
          echo "npm $(npm --version)" | tee -a "$GITHUB_STEP_SUMMARY"
      - name: Install dependencies
        run: npm ci
      - name: Generate deployment metadata environment
        run: |
          set -euo pipefail
          DEPLOYED_AT="$(date -u +'%Y-%m-%dT%H:%M:%S.000Z')"
          echo "NEXT_PUBLIC_DEPLOYED_AT=${DEPLOYED_AT}" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_DEPLOY_COMMIT_SHA=${{ inputs.commit_sha }}" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_DEPLOY_PULL_REQUEST_NUMBER=${{ inputs.pull_request_number }}" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_DEPLOY_REPOSITORY=${{ github.repository }}" >> "$GITHUB_ENV"
          echo "Deployment metadata: ${DEPLOYED_AT} / ${{ inputs.commit_sha }} / PR ${{ inputs.pull_request_number }}" >> "$GITHUB_STEP_SUMMARY"
      - name: Verify exact deployed commit
        run: test "$(git rev-parse HEAD)" = "${{ inputs.commit_sha }}"
      - name: Build OpenNext Cloudflare worker
        run: npm run build:worker
      - name: Validate Cloudflare deployment secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN}"
          test -n "${CLOUDFLARE_ACCOUNT_ID}"
      - name: Publish to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
      - name: Summarize deployment
        run: echo "Deployed commit ${{ inputs.commit_sha }} to Cloudflare production." >> "$GITHUB_STEP_SUMMARY"
