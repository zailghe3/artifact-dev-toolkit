name: Validate feature request JSON

on:
  pull_request:
    branches:
      - main
    paths:
      - 'requests/features/pending/*.json'

permissions:
  contents: read

jobs:
  validate-feature-requests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Validate feature issue tooling
        run: npm run issue:validate

      - name: Identify changed pending feature requests
        id: changed
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          mapfile -t files < <(node scripts/changed-pending-feature-requests.mjs)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No added or modified pending feature request JSON files found."
            echo "files=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          printf 'Changed pending feature request files:\n'
          printf ' - %s\n' "${files[@]}"
          {
            echo 'files<<EOF'
            printf '%s\n' "${files[@]}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Validate and dry-run render changed requests
        if: steps.changed.outputs.files != ''
        run: |
          mapfile -t files <<< "${{ steps.changed.outputs.files }}"
          npm run issue:validate-request -- "${files[@]}"
