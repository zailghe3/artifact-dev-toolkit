name: Trusted auto-merge

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  enable-auto-merge:
    name: trusted-auto-merge
    runs-on: ubuntu-latest
    steps:
      - name: Check trusted auto-merge eligibility
        id: eligibility
        env:
          GH_TOKEN: ${{ github.token }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
          HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          IS_DRAFT: ${{ github.event.pull_request.draft }}
        run: |
          set -euo pipefail
          if [[ "${IS_DRAFT}" == 'true' ]]; then
            echo 'eligible=false' >> "$GITHUB_OUTPUT"
            echo 'reason=Pull request is a draft.' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          gh api --paginate "repos/${REPOSITORY}/pulls/${PR_NUMBER}/files" --jq '.[] | {filename, previous_filename, status}' > files.jsonl
          node --input-type=module <<'NODE' >> "$GITHUB_OUTPUT"
          import { readFileSync } from 'node:fs';
          const exact = new Set(['package.json', 'package-lock.json', 'wrangler.jsonc']);
          const norm = (p) => String(p ?? '').replace(/^\.\//, '');
          const sensitive = (p) => norm(p).startsWith('.github/workflows/') || norm(p).startsWith('.github/actions/') || norm(p).startsWith('scripts/') || exact.has(norm(p)) || /^open-next\.config\..+$/.test(norm(p));
          const files = readFileSync('files.jsonl', 'utf8').split('\n').filter(Boolean).map(JSON.parse);
          const sensitiveFiles = [...new Set(files.flatMap((f) => [f.filename, f.previous_filename]).filter(Boolean).map(norm).filter(sensitive))].sort();
          let eligible = true;
          let reason = 'Trusted same-repository pull request contains no sensitive file changes.';
          if (process.env.PR_AUTHOR !== process.env.REPOSITORY_OWNER) { eligible = false; reason = `Pull request author '${process.env.PR_AUTHOR}' is not repository owner '${process.env.REPOSITORY_OWNER}'.`; }
          else if (process.env.HEAD_REPOSITORY !== process.env.REPOSITORY) { eligible = false; reason = 'Pull request branch is from a fork or different repository.'; }
          else if (sensitiveFiles.length) { eligible = false; reason = `Sensitive file changes require manual review: ${sensitiveFiles.join(', ')}`; }
          console.log(`eligible=${eligible}`);
          console.log(`reason=${reason}`);
          NODE

      - name: Explain decision
        run: echo "${{ steps.eligibility.outputs.reason }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Apply auto-merge label
        if: steps.eligibility.outputs.eligible == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr edit "${PR_URL}" --add-label auto-merge

      - name: Enable GitHub auto-merge
        if: steps.eligibility.outputs.eligible == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge "${PR_URL}" --auto --squash --delete-branch
