name: Apply label and enable auto-merge

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - ready_for_review

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  enable-auto-merge:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Apply auto-merge label
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr edit "$PR_URL" --add-label auto-merge

      - name: Enable GitHub auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge "$PR_URL" --auto --squash --delete-branch
