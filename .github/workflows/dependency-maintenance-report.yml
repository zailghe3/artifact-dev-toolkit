name: Dependency maintenance report

on:
  workflow_dispatch:
  schedule:
    - cron: '17 9 * * 1'

permissions:
  contents: read

jobs:
  report:
    name: report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7.0.0
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install canonical npm
        run: npm install -g "$(node -p 'require("./package.json").packageManager')"
      - name: Install dependencies
        run: npm ci
      - name: Generate deterministic maintenance report
        run: |
          npm run maintenance:report | tee maintenance-report.md
          cat maintenance-report.md >> "$GITHUB_STEP_SUMMARY"
