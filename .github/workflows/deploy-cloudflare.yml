name: Manual Cloudflare deployment

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Explicit main ref or SHA to deploy
        required: true
        default: main
        type: string

permissions:
  contents: read

jobs:
  deploy:
    uses: ./.github/workflows/reusable-deploy-cloudflare.yml
    with:
      ref: ${{ inputs.ref }}
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
