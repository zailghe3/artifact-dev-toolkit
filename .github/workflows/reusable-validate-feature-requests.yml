name: Reusable / validate feature requests

on:
  workflow_call:
    inputs:
      ref:
        required: true
        type: string
      files:
        required: false
        type: string

permissions:
  contents: read

jobs:
  validate-feature-requests:
    name: validate-feature-requests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install canonical npm
        run: npm install -g "$(node -p 'require("./package.json").packageManager')"
      - name: Report runtime versions
        run: |
          echo "Node.js $(node --version)" | tee -a "$GITHUB_STEP_SUMMARY"
          echo "npm $(npm --version)" | tee -a "$GITHUB_STEP_SUMMARY"
      - name: Install dependencies
        run: npm ci
      - name: Validate feature issue tooling
        run: npm run issue:validate
      - name: Validate changed request files
        env:
          FEATURE_REQUEST_FILES: ${{ inputs.files }}
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE' > existing-feature-files.txt
          import { existsSync } from 'node:fs';
          const files = String(process.env.FEATURE_REQUEST_FILES ?? '')
            .split(/\r?\n/)
            .map((file) => file.trim())
            .filter((file) => /^requests\/features\/[^/]+\.json$/.test(file) && existsSync(file));
          process.stdout.write([...new Set(files)].join('\n'));
          NODE
          mapfile -t files < existing-feature-files.txt
          if [[ "${#files[@]}" -eq 0 ]]; then
            echo 'No existing feature request JSON files require validation.'
            exit 0
          fi
          npm run issue:validate-request -- "${files[@]}"
