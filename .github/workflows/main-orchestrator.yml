name: Main lifecycle

on:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: main-lifecycle-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  classify:
    name: classify-main
    uses: ./.github/workflows/reusable-classify-changes.yml
    with:
      mode: push
      base_sha: ${{ github.event.before }}
      head_sha: ${{ github.sha }}

  verify-main:
    name: verify-main
    needs: classify
    uses: ./.github/workflows/reusable-verify.yml
    with:
      ref: ${{ github.sha }}

  create-feature-issues:
    name: create-feature-issues
    needs: [classify, verify-main]
    if: needs.classify.outputs.has_feature_request_changes == 'true'
    uses: ./.github/workflows/reusable-create-feature-issues.yml
    permissions:
      contents: read
      issues: write
    with:
      ref: ${{ github.sha }}
      mode: changed
      files: ${{ needs.classify.outputs.canonical_feature_files }}

  resolve-deployment-pr:
    name: resolve-deployment-pr
    needs: [classify, verify-main]
    if: needs.classify.outputs.deployable_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      pull_request_number: ${{ steps.resolve.outputs.pull_request_number }}
    steps:
      - name: Resolve associated pull request
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          pr_number="$(gh api "/repos/${REPOSITORY}/commits/${COMMIT_SHA}/pulls" \
            -H "Accept: application/vnd.github+json" \
            --jq 'if length > 0 then .[0].number else "" end')"
          echo "pull_request_number=${pr_number}" >> "$GITHUB_OUTPUT"

  deploy:
    name: deploy-cloudflare
    needs: [classify, verify-main, resolve-deployment-pr]
    if: needs.classify.outputs.deployable_changes == 'true'
    uses: ./.github/workflows/reusable-deploy-cloudflare.yml
    permissions:
      contents: read
    with:
      ref: ${{ github.sha }}
      commit_sha: ${{ github.sha }}
      pull_request_number: ${{ needs.resolve-deployment-pr.outputs.pull_request_number }}
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  summary:
    name: lifecycle-summary
    runs-on: ubuntu-latest
    needs: [classify, verify-main, create-feature-issues, resolve-deployment-pr, deploy]
    if: always()
    permissions:
      contents: read
    steps:
      - name: Write lifecycle summary
        run: |
          set -euo pipefail
          {
            echo '## Main lifecycle summary'
            echo '- Commit: `${{ github.sha }}`'
            echo '- Feature request changes: `${{ needs.classify.outputs.has_feature_request_changes }}`'
            echo '- Deployable changes: `${{ needs.classify.outputs.deployable_changes }}`'
            echo '- Verification: `${{ needs.verify-main.result }}`'
            echo '- Feature issue creation: `${{ needs.create-feature-issues.result }}`'
            echo '- PR resolution: `${{ needs.resolve-deployment-pr.result }}`'
            echo '- Deployment: `${{ needs.deploy.result }}`'
          } >> "$GITHUB_STEP_SUMMARY"
