name: Reusable / create feature issues

on:
  workflow_call:
    inputs:
      ref:
        required: true
        type: string
      mode:
        required: true
        type: string
      files:
        required: false
        type: string
      dry_run:
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  issues: write

concurrency:
  group: feature-issue-creation-${{ github.repository }}
  cancel-in-progress: false

jobs:
  create-feature-issues:
    name: create-feature-issues
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install canonical npm
        run: npm install -g "$(node -p 'require("./package.json").packageManager')"
      - name: Report runtime versions
        run: |
          echo "Node.js $(node --version)" | tee -a "$GITHUB_STEP_SUMMARY"
          echo "npm $(npm --version)" | tee -a "$GITHUB_STEP_SUMMARY"
      - name: Install dependencies
        run: npm ci
      - name: Validate feature issue tooling
        run: npm run issue:validate
      - name: Process missing issues
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          FEATURE_REQUEST_MODE: ${{ inputs.mode }}
          FEATURE_REQUEST_FILES: ${{ inputs.files }}
          FEATURE_REQUEST_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          node scripts/create-feature-issues-from-requests.mjs | tee feature-issues.log
          {
            echo '## Feature issue creation'
            echo 'Mode: `${{ inputs.mode }}`'
            echo 'Dry run: `${{ inputs.dry_run }}`'
            echo 'Files:'
            printf '%s\n' '${{ inputs.files }}'
            echo ''
            echo 'Log:'
            sed 's/^/- /' feature-issues.log
          } >> "$GITHUB_STEP_SUMMARY"
