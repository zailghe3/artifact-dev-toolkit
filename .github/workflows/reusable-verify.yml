name: Reusable / verify

on:
  workflow_call:
    inputs:
      ref:
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install canonical npm
        run: npm install -g "$(node -p 'require("./package.json").packageManager')"
      - name: Report runtime versions
        run: |
          echo "Node.js $(node --version)" | tee -a "$GITHUB_STEP_SUMMARY"
          echo "npm $(npm --version)" | tee -a "$GITHUB_STEP_SUMMARY"
      - name: Install dependencies
        run: npm ci
      - name: Validate toolchain contract
        run: npm run toolchain:validate
      - name: Test
        run: npm test
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Build Next.js app
        run: npm run build
      - name: Build OpenNext Cloudflare worker
        run: npm run build:worker
