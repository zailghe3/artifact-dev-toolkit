name: Repair package lock

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: Same-repository branch to repair
        required: true
        type: string

permissions:
  contents: write

jobs:
  regenerate-package-lock:
    name: regenerate-package-lock
    runs-on: ubuntu-latest
    steps:
      - name: Validate target branch
        env:
          TARGET_BRANCH: ${{ inputs.target_branch }}
          REPOSITORY_URL: ${{ github.server_url }}/${{ github.repository }}.git
        run: |
          set -euo pipefail

          if [[ -z "${TARGET_BRANCH}" ]]; then
            echo "target_branch is required" >&2
            exit 1
          fi

          case "${TARGET_BRANCH}" in
            refs/*|tags/*|*/../*|../*|*/..|.|..|*.lock|*.lock/*|*@{*|*\\*|*~*|*^*|*:*|*\?*|*\[*|*//*|/*|*-|*.)
              echo "Malformed or unsupported branch name: ${TARGET_BRANCH}" >&2
              exit 1
              ;;
          esac

          if [[ "${TARGET_BRANCH}" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "Commit SHAs are not accepted as target branches" >&2
            exit 1
          fi

          git check-ref-format --branch "${TARGET_BRANCH}"
          git ls-remote --exit-code --heads "${REPOSITORY_URL}" \
            "refs/heads/${TARGET_BRANCH}" >/dev/null

          case "${TARGET_BRANCH}" in
            main|repair/*|codex/*|dependabot/*)
              ;;
            *)
              echo "Branch is not in the permitted repair scope" >&2
              exit 1
              ;;
          esac

      - name: Checkout target branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7.0.0
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 0
          persist-credentials: true

      - name: Reset workspace to target branch
        env:
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          set -euo pipefail
          git fetch origin "refs/heads/${TARGET_BRANCH}:refs/remotes/origin/${TARGET_BRANCH}" --prune
          git checkout "${TARGET_BRANCH}"
          git reset --hard "origin/${TARGET_BRANCH}"

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Install and confirm canonical npm
        run: |
          set -euo pipefail
          npm install -g "$(node -p 'require("./package.json").packageManager')"
          node_version="$(node --version)"
          npm_version="$(npm --version)"
          expected_npm="$(node -p 'require("./package.json").packageManager.split("@").at(-1)')"
          if [[ "${npm_version}" != "${expected_npm}" ]]; then
            echo "Expected npm ${expected_npm}, got ${npm_version}" >&2
            exit 1
          fi
          {
            echo '## Runtime versions'
            echo "- Node.js: ${node_version}"
            echo "- npm: ${npm_version}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Regenerate package-lock.json
        run: |
          set -euo pipefail
          rm -rf node_modules package-lock.json
          npm install

      - name: Confirm regenerated lockfile from clean install
        run: |
          set -euo pipefail
          rm -rf node_modules
          npm ci

      - name: Run complete validation suite
        run: |
          set -euo pipefail
          npm run toolchain:validate
          npm test
          npm run lint
          npm run typecheck
          npm run build
          npm run build:worker
          npm run issue:validate
          {
            echo '## Validation results'
            echo '- npm run toolchain:validate: passed'
            echo '- npm test: passed'
            echo '- npm run lint: passed'
            echo '- npm run typecheck: passed'
            echo '- npm run build: passed'
            echo '- npm run build:worker: passed'
            echo '- npm run issue:validate: passed'
          } >> "$GITHUB_STEP_SUMMARY"
          git restore --source=HEAD --worktree -- next-env.d.ts tsconfig.json
          
      - name: Ensure only package-lock.json changed
        run: |
          set -euo pipefail
          changed_files="$(git status --porcelain --untracked-files=no | sed 's/^...//')"
          if [[ -n "${changed_files}" && "${changed_files}" != 'package-lock.json' ]]; then
            echo "Unexpected modified files:" >&2
            printf '%s\n' "${changed_files}" >&2
            exit 1
          fi

      - name: Commit and push regenerated lockfile
        env:
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          set -euo pipefail
          if git diff --quiet -- package-lock.json; then
            {
              echo '## Package lock repair'
              echo '- No package-lock.json changes were generated; nothing was committed or pushed.'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package-lock.json

          staged_files="$(git diff --cached --name-only)"
          if [[ "${staged_files}" != 'package-lock.json' ]]; then
            echo "Unexpected staged files:" >&2
            printf '%s\n' "${staged_files}" >&2
            exit 1
          fi

          git commit -m 'Regenerate package lock with canonical npm'
          git push origin "HEAD:${TARGET_BRANCH}"
          {
            echo '## Package lock repair'
            echo "- Updated branch: ${TARGET_BRANCH}"
            echo '- Commit: Regenerate package lock with canonical npm'
          } >> "$GITHUB_STEP_SUMMARY"
