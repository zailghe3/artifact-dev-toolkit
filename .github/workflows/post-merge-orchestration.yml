name: Post-merge orchestration

on:
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  actions: write
  contents: read
  issues: write
  pull-requests: read

jobs:
  orchestrate:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Inspect merged pull request files
        id: files
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr view "$PR_NUMBER" --json files --jq '.files[].path' > files.txt
          feature_files=$(awk '/^requests\/features\/[^/]+\.json$/ { print }' files.txt)
          runtime_files=$(awk '
            /^(app|components|lib|public)\// { print; next }
            /^(next\.config\.ts|open-next\.config\.ts|wrangler\.jsonc|package\.json|package-lock\.json|tsconfig\.json|postcss\.config\.js|tailwind\.config\.ts)$/ { print; next }
          ' files.txt)
          {
            echo 'feature_files<<EOF'
            printf '%s\n' "$feature_files"
            echo 'EOF'
            echo 'runtime_files<<EOF'
            printf '%s\n' "$runtime_files"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
          printf 'Feature files:\n%s\n' "$feature_files"
          printf 'Runtime files:\n%s\n' "$runtime_files"

      - name: Check out repository
        if: steps.files.outputs.feature_files != ''
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: steps.files.outputs.feature_files != ''
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        if: steps.files.outputs.feature_files != ''
        run: npm install

      - name: Create issues for changed feature requests
        if: steps.files.outputs.feature_files != ''
        env:
          GH_TOKEN: ${{ github.token }}
          FEATURE_REQUEST_MODE: changed
          FEATURE_REQUEST_FILES: ${{ steps.files.outputs.feature_files }}
        run: node scripts/create-feature-issues-from-requests.mjs

      - name: Dispatch Cloudflare deployment workflow
        if: steps.files.outputs.runtime_files != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-cloudflare.yml --ref main
